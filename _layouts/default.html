<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% include head-custom.html %}
</head>
<body class="{% if page.url == '/experience.html' or page.url == '/experience/' %}experience-page{% elsif page.url == '/education.html' or page.url == '/education/' %}education-page{% endif %}">
  <div class="site-wrapper">
    <aside class="site-sidebar">
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
        <a href="{{ '/experience.html' | relative_url }}" class="nav-link">Experience</a>
        <a href="{{ '/education.html' | relative_url }}" class="nav-link">Education</a>
        <a href="{{ '/projects.html' | relative_url }}" class="nav-link">Projects</a>
        <a href="{{ '/art.html' | relative_url }}" class="nav-link">Art</a>
        <a href="{{ '/fun-stuff.html' | relative_url }}" class="nav-link">Fun Stuff</a>
      </nav>
      <footer class="site-footer">
        <div class="footer-links">
          <a href="https://github.com/{{ site.github.owner_name | default: 'EireannCoelho' }}" target="_blank" rel="noopener">GitHub</a>
          <span class="footer-divider">·</span>
          <a href="https://www.linkedin.com/in/eireann-coelho/" target="_blank" rel="noopener">LinkedIn</a>
        </div>
        <div class="footer-hosted">Hosted on GitHub Pages</div>
      </footer>
    </aside>

    <main class="site-main">
      {{ content }}
    </main>
  </div>
</body>
</html>
